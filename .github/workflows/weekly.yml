name: AlphaAbsolute Weekly

# Sunday 08:00 Bangkok time = Saturday 01:00 UTC
on:
  schedule:
    - cron: '0 1 * * 6'    # Saturday 01:00 UTC = Sunday 08:00 ICT
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  weekly-run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/paper_trading data/nrgc/state data/state data/raw output

      - name: Run weekly runner
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/runners/weekly_runner.py

      - name: Commit updated state + lessons
        run: |
          git config user.name  "AlphaAbsolute Bot"
          git config user.email "bot@alphaabsolute.ai"
          git add data/paper_trading/ \
                  data/nrgc/state/ \
                  data/state/ || true
          git diff --cached --quiet || git commit -m "auto: weekly update $(date -u +%Y-%m-%d)"
          git push || true
