name: AlphaAbsolute Daily

# Mon-Fri 06:30 Bangkok time = 23:30 UTC (previous day)
on:
  schedule:
    - cron: '30 23 * * 0-4'   # Sun-Thu 23:30 UTC = Mon-Fri 06:30 ICT
  workflow_dispatch:            # Manual trigger from GitHub UI

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p data/paper_trading data/nrgc/state data/state data/raw output \
                   data/agent_memory data/smart_signals memory

      - name: Run daily runner
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/runners/daily_runner.py

      - name: Commit updated state
        run: |
          git config user.name  "AlphaAbsolute Bot"
          git config user.email "bot@alphaabsolute.ai"
          git add data/paper_trading/portfolio_state.json \
                  data/paper_trading/trade_log.json \
                  data/paper_trading/lessons.json \
                  data/paper_trading/performance_history.json \
                  data/state/ \
                  data/agent_memory/indicator_discovery_log.json || true
          git diff --cached --quiet || git commit -m "auto: daily update $(date -u +%Y-%m-%d)"
          git push || true
